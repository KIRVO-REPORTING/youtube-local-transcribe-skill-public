interface:
  display_name: "Video Report Builder"
  short_description: "Build concise timestamped video reports"
  default_prompt: "Use $youtube-local-transcribe for this video link: derive the real video title, rename the thread to the video topic when possible, prefer captions then local Whisper, write an answer-first summary with timestamped Key Points whose optional one-level nested bullets contain transcript-backed details, examples, numbers, or caveats, parallelizing long transcript drafting when useful, finalize and publish the clean Notion row report with the full transcript in the final folded Transcript block, then answer with the title, summary, links, key points, and caveats without verbose processing logs."
policy:
  allow_implicit_invocation: true
